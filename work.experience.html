    .result-card h4 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.4;
    }
    .result-card .thumb-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .result-card .thumb-row img {
      width: 160px;
      height: 90px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .result-card .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }
    .btn-watch {
      background: #c00;
      color: #fff;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-watch:hover { background: #e00; }
    .btn-mp3 {
      background: #1a7a1a;
      color: #fff;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-mp3:hover { background: #259025; }

    /* 嵌入播放器（展開用） */
    .embed-area {
      margin-top: 10px;
      display: none;
    }
    .embed-area iframe {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 8px;
    }
    .btn-embed {
      background: #444;
      color: #fff;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }
    .btn-embed:hover { background: #666; }

    /* 狀態提示 */
    #searchStatus {
      color: #888;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }

    footer {
      background-color: #333;
      color: #fff;
      text-align: center;

      width: 100%;

    }
    #back-to-top-container {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
    #back-to-top {
      background-color: #444;
      color: #fff;
      font-weight: bold;
      padding: 10px 20px;
      text-decoration: none;
      border: 2px solid #444;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    #back-to-top:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* 提示 tooltip */
    .cobalt-note {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>

<script>
  /* ── API 金鑰輪換 ── */
  const API_KEYS = [
    'AIzaSyBr-sdbGNR6zd0irk251xHguuKyQVDg6q8',
    'AIzaSyAtDWcQXc8qu_RGqpetnVjaA4yp3iBdaPo',
    'AIzaSyAbcUkeJsXKDxCBvKq7wlSS0rB7MuJoQpM',
    'AIzaSyDL3ZFDn547p4JjvKdHoJV5AuG7AOqqBoY'
  ];
  let currentApiKeyIndex = 0;

  /* ── 搜尋按鈕 ── */
  $('#searchButton').click(function () {
    const query = $('#searchQuery').val().trim();
    if (!query) return;
    searchYouTube(query);
  });

  /* ── 推薦按鈕 ── */
  $('#recommendButton').click(function () {
    const recommendations = ['音樂', 'Emmy追劇時間', '財經早晨速解讀'];
    $('#searchQuery').val(recommendations[Math.floor(Math.random() * recommendations.length)]);
    $('#searchButton').click();
  });

  /* ── Enter 鍵觸發搜尋 ── */
  document.getElementById('searchQuery').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') $('#searchButton').click();
  });

  /* ── 搜尋主函式 ── */
  function searchYouTube(query) {
    const apiKey = API_KEYS[currentApiKeyIndex];
    $('#results').empty();
    $('#searchStatus').text('搜尋中…');

    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&maxResults=20&type=video&key=${apiKey}`;

    $.getJSON(searchUrl, function (data) {
      const videoIds = data.items.map(item => item.id.videoId).join(',');
      if (!videoIds) {
        $('#searchStatus').text('找不到相關影片。');
        return;
      }

      /* 取得影片詳細資訊（包含 embeddable 狀態）*/
      const detailsUrl = `https://www.googleapis.com/youtube/v3/videos?part=status,snippet&id=${videoIds}&key=${apiKey}`;
      $.getJSON(detailsUrl, function (videoData) {
        $('#searchStatus').text(`找到 ${videoData.items.length} 部影片`);
        $('#results').empty();

        videoData.items.forEach(function (video) {
          const videoId   = video.id;
          const title     = $('<div>').text(video.snippet.title).html(); // XSS 防護
          const thumb     = video.snippet.thumbnails.medium.url;
          const ytUrl     = `https://www.youtube.com/watch?v=${videoId}`;

          /* ── cobalt.tools：免費、開源的影音下載工具 ── */
          const cobaltUrl = `https://cobalt.tools/#${encodeURIComponent(ytUrl)}`;

          const card = `
            <div class="result-card">
              <h4>${title}</h4>
              <div class="thumb-row">
                <img src="${thumb}" alt="縮圖">
                <div class="btn-group">
                  <a class="btn-watch" href="${ytUrl}" target="_blank">▶ 前往 YouTube</a>
                  <button class="btn-embed" onclick="toggleEmbed(this, '${videoId}')">📺 在頁面播放</button>
                  <a class="btn-mp3" href="${cobaltUrl}" target="_blank">🎵 下載 MP3</a>
                  <span class="cobalt-note">透過 cobalt.tools 下載</span>
                </div>
              </div>
              <div class="embed-area" id="embed-${videoId}">
                <iframe
                  src="https://www.youtube.com/embed/${videoId}"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen>
                </iframe>
              </div>
            </div>`;
          $('#results').append(card);
        });
      });
    }).fail(function () {
      /* 金鑰失效時自動切換下一把 */
      currentApiKeyIndex = (currentApiKeyIndex + 1) % API_KEYS.length;
      if (currentApiKeyIndex === 0) {
        $('#searchStatus').text('所有 API 金鑰均已用盡，請稍後再試。');
      } else {
        searchYouTube(query);
      }
    });
  }

  /* ── 在頁面內展開 / 收合播放器 ── */
  function toggleEmbed(btn, videoId) {
    const area = document.getElementById('embed-' + videoId);
    if (area.style.display === 'block') {
      area.style.display = 'none';
      btn.textContent = '📺 在頁面播放';
    } else {
      area.style.display = 'block';
      btn.textContent = '▲ 收合播放器';
    }
  }

  /* ── 回到頂部 ── */
  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  window.onscroll = function () {
    const btn = document.getElementById('back-to-top-container');
    btn.style.display = (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20)
      ? 'block' : 'none';
  };
  document.addEventListener('DOMContentLoaded', function () { window.onscroll(); });
</script>
