    .card-info { flex: 1; min-width: 0; }
    .card-title {

  </style>

<script>
/* ── YouTube Data API 金鑰輪換 ── */
const API_KEYS = [
  'AIzaSyBr-sdbGNR6zd0irk251xHguuKyQVDg6q8',
  'AIzaSyAtDWcQXc8qu_RGqpetnVjaA4yp3iBdaPo',
  'AIzaSyAbcUkeJsXKDxCBvKq7wlSS0rB7MuJoQpM',
  'AIzaSyDL3ZFDn547p4JjvKdHoJV5AuG7AOqqBoY'
];
let currentApiKeyIndex = 0;

function getBackend() {
  return ($('#backendUrl').val() || '').replace(/\/$/, '').trim();
}

/* ── 搜尋 ── */
$('#searchButton').click(function () {
  const q = $('#searchQuery').val().trim();
  if (q) searchYouTube(q);
});

$('#recommendButton').click(function () {
  const list = ['JPOP音樂', 'Emmy追劇時間', '財經早晨速解讀',];
  $('#searchQuery').val(list[Math.floor(Math.random() * list.length)]);
  $('#searchButton').click();
});

document.getElementById('searchQuery').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') $('#searchButton').click();
});

function searchYouTube(query) {
  const apiKey = API_KEYS[currentApiKeyIndex];
  $('#results').empty();
  $('#searchStatus').text('搜尋中…');

  const searchUrl =
    `https://www.googleapis.com/youtube/v3/search` +
    `?part=snippet&q=${encodeURIComponent(query)}&maxResults=20&type=video&key=${apiKey}`;

  $.getJSON(searchUrl, function (data) {
    const videoIds = data.items.map(i => i.id.videoId).join(',');
    if (!videoIds) { $('#searchStatus').text('找不到相關影片。'); return; }

    const detailsUrl =
      `https://www.googleapis.com/youtube/v3/videos` +
      `?part=status,snippet&id=${videoIds}&key=${apiKey}`;

    $.getJSON(detailsUrl, function (videoData) {
      $('#searchStatus').text(`找到 ${videoData.items.length} 首`);
      $('#results').empty();

      videoData.items.forEach(function (video) {
        const videoId = video.id;
        const title   = $('<div>').text(video.snippet.title).html();
        const thumb   = (video.snippet.thumbnails.medium || video.snippet.thumbnails.default).url;
        const ytUrl   = `https://www.youtube.com/watch?v=${videoId}`;

        $('#results').append(`
          <div class="result-card">
            <div class="thumb-wrap">
              <img src="${thumb}" alt="縮圖" loading="lazy">
            </div>
            <div class="card-info">
              <div class="card-title" title="${title}">${title}</div>
              <button class="load-mp3-btn"
                onclick="loadMp3(this, '${ytUrl}')">▶ 播放 MP3</button>
            </div>
          </div>`);
      });
    });

  }).fail(function () {
    currentApiKeyIndex = (currentApiKeyIndex + 1) % API_KEYS.length;
    if (currentApiKeyIndex === 0) {
      $('#searchStatus').text('所有 API 金鑰均已用盡，請稍後再試。');
    } else {
      searchYouTube(query);
    }
  });
}

/* ── 點擊「播放 MP3」→ 呼叫 Railway 後端串流 ── */
function loadMp3(btn, ytUrl) {
  const backend = getBackend();
  if (!backend) {
    alert('⚠️ 請先在上方填入 Railway 後端網址！');
    return;
  }

  const streamUrl = `${backend}/stream?url=${encodeURIComponent(ytUrl)}`;
  btn.disabled    = true;
  btn.textContent = '載入中…';

  const audio       = document.createElement('audio');
  audio.controls    = true;
  audio.preload     = 'none';
  audio.src         = streamUrl;
  audio.style.width = '100%';
  audio.style.marginTop = '6px';
  audio.style.borderRadius = '20px';

  audio.addEventListener('canplay', () => btn.remove());
  audio.addEventListener('error',   () => {
    btn.disabled    = false;
    btn.textContent = '▶ 播放 MP3';
    alert('串流失敗，請確認後端是否正常運作。');
  });

  btn.parentElement.appendChild(audio);
  audio.load();
  btn.textContent = '緩衝中…';
}

/* ── 回到頂部 ── */
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
window.onscroll = function () {
  document.getElementById('back-to-top-container').style.display =
    (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) ? 'block' : 'none';
};
document.addEventListener('DOMContentLoaded', () => window.onscroll());
</script>
